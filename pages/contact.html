<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - DreamBase</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="app">
        <!-- ナビゲーション -->
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h1><a href="../index.html" style="color: white; text-decoration: none;">DreamBase</a></h1>
                </div>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <ul class="nav-menu">
                    <h1><a href="../index.html" style="color: white; text-decoration: none;">DreamBase</a></h1>
                    <li><a href="../index.html" class="nav-link">HOME</a></li>
                    <li class="has-submenu">
                        <a href="service.html" class="nav-link service-toggle">Service</a>
                        <ul class="submenu">
                            <li><a href="service/osteopathy.html">整体事業</a></li>
                            <li><a href="service/salon.html">オンラインサロン事業</a></li>
                            <li><a href="service/school.html">講座・スクール事業</a></li>
                            <li><a href="service/therapist.html">企業向けオフィスセラピー事業</a></li>
                        </ul>
                    </li>
                    <li><a href="company.html" class="nav-link">Company</a></li>
                    <li><a href="staff.html" class="nav-link">Staff</a></li>
                    
                    <li><a href="contact.html" class="nav-link active">Contact</a></li>
                </ul>
            </div>
        </nav>

        <!-- メインコンテンツ -->
        <main id="content">
            <section class="page-section">
                <div class="container">
                    <h2 class="section-title">お問い合わせ</h2>
                    
                    <div class="form-container">
                        <form id="contactForm">
                            <div class="form-group">
                                <label for="name">お名前 *</label>
                                <input type="text" id="name" name="name" required>
                            </div>

                            <div class="form-group">
                                <label for="email">メールアドレス *</label>
                                <input type="email" id="email" name="email" required>
                            </div>

                            <div class="form-group">
                                <label for="phone">電話番号</label>
                                <input type="tel" id="phone" name="phone">
                            </div>

                            <div class="form-group">
                                <label for="company">会社名</label>
                                <input type="text" id="company" name="company">
                            </div>

                            <div class="form-group">
                                <label for="subject">お問い合わせ内容 *</label>
                                <select id="subject" name="subject" required>
                                    <option value="">選択してください</option>
                                    <option value="osteopathy">整体事業について</option>
                                    <option value="salon">オンラインサロン事業について</option>
                                    <option value="school">講座・スクール事業について</option>
                                    <option value="therapist">企業向けオフィスセラピー事業について</option>
                                    <option value="other">その他</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="message">メッセージ *</label>
                                <textarea id="message" name="message" rows="5" required></textarea>
                            </div>

                            <button type="submit" class="btn">送信</button>
                        </form>
                    </div>

                    <div style="margin-top: 3rem;">
                        <h2 class="section-title">その他の連絡方法</h2>
                        <div class="card-grid">
                            <div class="card">
                                <h3>📍 所在地</h3>
                                <p>〒665-0011<br>兵庫県宝塚市南口1-14-25<br>加藤マンション101号室</p>
                            </div>
                            <div class="card">
                                <h3>📞 電話</h3>
                                <p>070-3152-1392</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- フッター -->
        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 DreamBase. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="../js/navigation.js"></script>
    <script src="../js/contact.js"></script>
</body>
</html>
